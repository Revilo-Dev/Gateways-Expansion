modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="[21.1,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="placebo"
mandatory=true
versionRange="[${placebo_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="apothic_attributes"
mandatory=true
versionRange="[${apothic_attributes_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="gateways"
mandatory=true
versionRange="[${gateways_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="levelup"
mandatory=false
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
